rules:
  - id: javascript.lang.security.detect-eval-with-expression
    message: Avoid eval with dynamic input because it can execute arbitrary code.
    severity: ERROR
    languages:
      - javascript
      - typescript
    metadata:
      category: security
      cwe:
        - "CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code"
      owasp:
        - A03:2021 - Injection
    patterns:
      - pattern: eval($EXPR)
      - pattern-not: eval("...")

  - id: javascript.lang.security.detect-new-function
    message: Avoid Function constructors because they evaluate strings as code.
    severity: ERROR
    languages:
      - javascript
      - typescript
    metadata:
      category: security
      cwe:
        - "CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code"
      owasp:
        - A03:2021 - Injection
    patterns:
      - pattern-either:
          - pattern: new Function(...)
          - pattern: Function(...)

  - id: javascript.lang.security.detect-hardcoded-secret
    message: Possible hardcoded secret. Use environment variables or a secret manager instead.
    severity: WARNING
    languages:
      - javascript
      - typescript
    metadata:
      category: security
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - A07:2021 - Identification and Authentication Failures
    patterns:
      - pattern-either:
          - pattern: const $NAME = "$VALUE"
          - pattern: let $NAME = "$VALUE"
          - pattern: var $NAME = "$VALUE"
          - pattern: $OBJ.$NAME = "$VALUE"
          - pattern: $OBJ[$NAME] = "$VALUE"
      - metavariable-regex:
          metavariable: $NAME
          regex: (?i)^(?!.*(header|footer)).*(api[_-]?key|secret|token|password|passwd|pwd|private[_-]?key).*$
      - metavariable-regex:
          metavariable: $VALUE
          regex: .{12,}

  - id: javascript.lang.security.detect-math-random-secret
    message: Do not use Math.random for secret, token, password, nonce, or key generation.
    severity: WARNING
    languages:
      - javascript
      - typescript
    metadata:
      category: security
      cwe:
        - "CWE-338: Use of Cryptographically Weak Pseudo-Random Number Generator"
      owasp:
        - A02:2021 - Cryptographic Failures
    patterns:
      - pattern-either:
          - pattern: const $NAME = Math.random(...)
          - pattern: let $NAME = Math.random(...)
          - pattern: var $NAME = Math.random(...)
          - pattern: $OBJ.$NAME = Math.random(...)
          - pattern: $OBJ[$NAME] = Math.random(...)
      - metavariable-regex:
          metavariable: $NAME
          regex: (?i).*(secret|token|password|passwd|pwd|nonce|key).*

name: Publish
on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Run pre-commit checks
        run: deno task git-pre-commit

      - name: Publish package
        run: npx jsr publish
